<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixorasoft — Yakında Dönüyoruz</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #06060a;
            color: #ffffff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            text-align: center;
            position: relative;
            z-index: 10;
        }
        h1 {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: -0.05em;
            margin: 0;
            background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }
        p {
            font-size: 1.125rem;
            color: #94a3b8;
            margin-top: 1rem;
            font-weight: 500;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.6;
        }
        .orb {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(249, 115, 22, 0.15) 0%, rgba(249, 115, 22, 0) 70%);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            filter: blur(80px);
            z-index: 1;
            animation: pulse 8s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.8; }
        }
        .badge {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: rgba(249, 115, 22, 0.1);
            border: 1px solid rgba(249, 115, 22, 0.2);
            color: #f97316;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 2rem;
        }
        .footer {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        .footer a {
            color: #f97316;
            text-decoration: none;
            font-weight: 700;
            border-bottom: 1px solid transparent;
            transition: all 0.3s;
        }
        .footer a:hover {
            border-bottom-color: #f97316;
        }
    </style>
</head>
<body>
    <div class="orb"></div>
    <div class="container">
        <div class="badge">Yeni Dönem Hazırlığı</div>
        <h1>Gelişiyoruz.</h1>
        <p>
            Pixorasoft, daha güçlü ve yenilikçi bir yapı ile çok yakında tekrar yayında olacak.
        </p>
        <div class="footer">
            <p style="font-size: 0.875rem;">
                Bu proje bir <a href="https://pixoraco.com">PixoraCo</a> ürünüdür.
            </p>
        </div>
    </div>
</body>
</html>
