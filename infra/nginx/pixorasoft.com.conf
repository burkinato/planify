server {
    server_name pixorasoft.com www.pixorasoft.com;

    root /var/www/planify/infra/maintenance;
    index maintenance.html;

    location / {
        try_files $uri $uri/ /maintenance.html;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/planify.pixorasoft.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/planify.pixorasoft.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}
server {
    if ($host = www.pixorasoft.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = pixorasoft.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name pixorasoft.com www.pixorasoft.com;
    return 404; # managed by Certbot




}